services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: hyrox-frontend
    restart: unless-stopped
    ports:
      - '4200:4200'
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    networks:
      - hyrox-network
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ] ||
      ! npm ls --depth=0 >/dev/null 2>&1; then npm ci; fi; npm start"

networks:
  hyrox-network:
    driver: bridge

volumes:
  node_modules:
