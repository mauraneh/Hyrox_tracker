name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  frontend-test:
    name: Frontend - Test & Build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci --audit=false
        env:
          npm_config_audit: false

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:coverage -- --browsers=ChromeHeadless
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Build
        run: npm run build

  pages-build:
    name: Pages - Build
    runs-on: ubuntu-22.04
    needs: frontend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --audit=false
        env:
          npm_config_audit: false

      - name: Compute base href
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY%%/*}"
          if [ "$repo" = "${owner}.github.io" ]; then
            echo "BASE_HREF=/" >> "$GITHUB_ENV"
          else
            echo "BASE_HREF=/${repo}/" >> "$GITHUB_ENV"
          fi

      - name: Build for GitHub Pages
        run: npm run build -- --configuration production --base-href "${BASE_HREF}" --deploy-url "${BASE_HREF}"

      - name: Add SPA fallback
        run: cp dist/frontend/index.html dist/frontend/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/frontend

  pages-deploy:
    name: Pages - Deploy
    runs-on: ubuntu-22.04
    needs: pages-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
